server.port=8080

# ============================================================================
# H2 - Base de datos en memoria para LIBROS (JPA)
# ============================================================================
spring.datasource.url=jdbc:h2:mem:librotech_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
# Con Flyway, Hibernate NO debe crear el esquema. Validamos contra las migraciones.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# =========================================================================
# Flyway
# =========================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ============================================================================
# Thymeleaf
# ============================================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================================
# MongoDB Atlas - Persistencia del CHAT (mensajes y memoria del bot)
# ============================================================================
# Cluster "riwi" de MongoDB Atlas. La base "librotech_chat" se crea
# automaticamente al guardar el primer mensaje (no hay que crearla a mano).
# La coleccion "mensajes" tambien la crea Spring Data Mongo al insertar.
spring.data.mongodb.uri=mongodb+srv://adminchatbot:[email protected]/librotech_chat?retryWrites=true&w=majority&appName=riwi
spring.data.mongodb.database=librotech_chat

# ============================================================================
# Gemini (Google AI Studio) - Capa gratuita
# ============================================================================
# Reemplaza el valor con tu propia API key de https://aistudio.google.com/apikey
# El modelo gemini-2.0-flash es rapido y forma parte de la capa gratuita.
gemini.api.key=AIzaSyBX_t4ano-GGh1mRCATJC-BCcbTzl7yJPk
gemini.api.model=gemini-flash-latest
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# Cuantos mensajes recientes se envian a la IA como contexto.
gemini.contexto.mensajes=10

# ============================================================================
# Logs
# ============================================================================
logging.level.com.riwi.librotech=TRACE

# Flyway (migraciones)
logging.level.org.flywaydb=TRACE

# Hibernate / JPA (SQL + bind params)
logging.level.org.hibernate.SQL=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

logging.level.org.springframework.data.mongodb.core=INFO
